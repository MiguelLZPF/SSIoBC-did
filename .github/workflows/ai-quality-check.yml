name: AI Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**/*.sol'
      - 'test/**/*.sol'
      - 'script/**/*.sol'

  push:
    branches:
      - main
      - feat/**
    paths:
      - 'src/**/*.sol'
      - 'test/**/*.sol'
      - 'script/**/*.sol'

  workflow_dispatch:  # Allow manual triggering

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.3

      - name: Run Forge Build
        run: forge build --force
        continue-on-error: false

      - name: Check Contract Sizes
        run: |
          forge build --sizes 2>&1 | tee contract-sizes.txt
          echo "## Contract Sizes" >> $GITHUB_STEP_SUMMARY
          cat contract-sizes.txt >> $GITHUB_STEP_SUMMARY
          # Check no contract exceeds 24KB (24576 bytes) EIP-170 limit
          if awk '/\|/ && NR>2 {split($0,a,"|"); gsub(/[[:space:]]/,"",a[3]); if(a[3]+0 > 24.576) {print "FAIL: " a[2] " exceeds 24KB limit (" a[3] " KB)"; exit 1}}' contract-sizes.txt; then
            echo "✅ All contracts within EIP-170 size limits"
          fi
        continue-on-error: false

      - name: Run Forge Tests
        run: forge test -vv
        continue-on-error: false
        id: tests

      - name: Generate Coverage Report
        run: |
          forge coverage --report summary > coverage-summary.txt
          forge coverage --report lcov > lcov.info
        continue-on-error: true

      - name: Check Coverage Threshold
        run: |
          # Extract coverage percentage
          COVERAGE=$(grep -oP 'Overall coverage: \K[0-9.]+' coverage-summary.txt || echo "0")
          echo "Coverage: $COVERAGE%"

          # Require >90% coverage (matching project standard)
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 90% threshold"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets 90% threshold"
          fi
        continue-on-error: false

      - name: Run Forge Format Check
        run: forge fmt --check
        continue-on-error: false
        id: format

      - name: Run Forge Lint
        run: forge lint
        continue-on-error: false
        id: lint

      - name: Analyze Gas Costs
        run: |
          echo "## Gas Cost Analysis" >> $GITHUB_STEP_SUMMARY
          forge test --gas-report >> gas-report.txt
          cat gas-report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Run Slither Analysis
        run: |
          pip3 install slither-analyzer
          echo "## Slither Static Analysis" >> $GITHUB_STEP_SUMMARY
          slither . --filter-paths "lib/|test/|script/" --exclude-dependencies 2>&1 | tee slither-report.txt || true
          cat slither-report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Security Scan Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Compilation Warnings" >> $GITHUB_STEP_SUMMARY
          forge build 2>&1 | grep -i "warning" || echo "No warnings detected" >> $GITHUB_STEP_SUMMARY

          echo "### Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "- Review gas costs in gas-report.txt" >> $GITHUB_STEP_SUMMARY
          echo "- Verify test coverage meets >90% threshold" >> $GITHUB_STEP_SUMMARY
          echo "- Review Slither analysis for potential vulnerabilities" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-summary.txt
            lcov.info
            gas-report.txt
        if: always()

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let coverage = 'N/A';
            try {
              const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
              const match = summary.match(/Overall coverage: ([0-9.]+)/);
              coverage = match ? match[1] + '%' : 'N/A';
            } catch (e) {}

            const comment = `## 🤖 AI Quality Check Results

            ### Coverage
            ${coverage}

            ### Recommendations
            - ✅ Contracts compile successfully
            - ✅ Tests executed (see test results above)
            - 📊 Coverage report generated
            - ⛽ Gas costs analyzed

            ### Next Steps
            ${coverage !== 'N/A' && parseFloat(coverage) < 90 ? '⚠️ Coverage below 90% - add more tests' : '✅ Coverage meets threshold'}

            For detailed security analysis, consider running:
            - \`slither .\` for static analysis
            - \`@agent-blockchain-code-assassin\` in Claude Code for deep review

            ---
            *Generated by AI Quality Check workflow*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: comment
            });
        continue-on-error: true

      - name: Final Status
        run: |
          echo "✅ AI Quality Check Complete"
          echo "Review the summary above and artifacts for detailed analysis"
