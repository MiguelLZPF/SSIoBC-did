name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.sol"
      - "test/**/*.sol"
      - "script/**/*.sol"
      - "foundry.toml"
      - ".github/workflows/ci.yml"

  push:
    branches:
      - main
    paths:
      - "src/**/*.sol"
      - "test/**/*.sol"
      - "script/**/*.sol"
      - "foundry.toml"
      - ".github/workflows/ci.yml"

  workflow_dispatch:
    inputs:
      skip-security:
        description: "Skip Slither security scan"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Job 1: Compile & Size Check ────────────────────────────────────
  build:
    name: Build & Size Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Compile contracts
        run: forge build --sizes 2>&1 | tee contract-sizes.txt

      - name: Validate EIP-170 size limits
        run: |
          # Fail if any contract's runtime size exceeds 24576 bytes (24KB)
          # Column 2 = Contract name, Column 3 = Runtime Size (B) with commas
          awk -F '|' '/\|/ && NR>4 {
            name=$2; size=$3;
            gsub(/[[:space:],]/, "", name);
            gsub(/[[:space:],]/, "", size);
            if (size+0 > 24576) {
              printf "FAIL: %s exceeds 24KB limit (%s bytes)\n", name, size;
              fail=1
            }
          } END { if (fail) exit 1 }' contract-sizes.txt
          echo "All contracts within EIP-170 size limits"

      - name: Post size summary
        run: |
          echo "## Contract Sizes" >> "$GITHUB_STEP_SUMMARY"
          cat contract-sizes.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Cache build artifacts
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            out/
            cache/
          key: build-${{ github.sha }}

  # ─── Job 2: Test Suite ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Restore build cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            out/
            cache/
          key: build-${{ github.sha }}

      - name: Run tests
        run: forge test -vv --no-match-path "test/{stress,performance}/*"

  # ─── Job 3: Coverage Analysis ───────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Restore build cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            out/
            cache/
          key: build-${{ github.sha }}

      - name: Generate LCOV report
        run: forge coverage --report lcov --no-match-path "test/{stress,performance}/*"

      - name: Filter coverage to source contracts
        run: |
          sudo apt-get install -y -qq lcov > /dev/null 2>&1
          lcov --remove lcov.info \
            'test/*' 'script/*' 'lib/*' \
            --output-file lcov-filtered.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

      - name: Enforce 90% coverage threshold
        run: |
          COVERAGE=$(lcov --summary lcov-filtered.info 2>&1 | grep -oP 'lines\.*: \K[0-9.]+')
          echo "Line coverage: ${COVERAGE}%"
          echo "## Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          if [ "$(echo "$COVERAGE < 90" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          lcov-file: lcov-filtered.info
          filter-changed-files: true
          delete-old-comments: true
          title: "Coverage Report"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: |
            lcov.info
            lcov-filtered.info
          retention-days: 30

  # ─── Job 4: Format & Lint ──────────────────────────────────────────
  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Check formatting
        run: forge fmt --check

      - name: Run linter
        run: forge lint

  # ─── Job 5: Slither Security Scan ──────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip-security && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        continue-on-error: true
        with:
          sarif: slither-results.sarif
          fail-on: none
          slither-args: --filter-paths "lib/|test/|script/" --exclude-dependencies

      - name: Upload Slither report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always() && hashFiles('slither-results.sarif') != ''
        with:
          name: slither-sarif
          path: slither-results.sarif
          retention-days: 30

  # ─── Job 6: Gas Comparison (PRs only) ──────────────────────────────
  gas-diff:
    name: Gas Diff
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      actions: read
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Restore build cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            out/
            cache/
          key: build-${{ github.sha }}

      - name: Generate gas report
        run: forge test --gas-report --no-match-path "test/{stress,performance}/*" > gasreport.ansi
        env:
          FOUNDRY_FUZZ_SEED: "0x${{ github.event.pull_request.base.sha }}"

      - name: Compare gas reports
        uses: Rubilmax/foundry-gas-diff@60e763d02526ee3299bd04278cb178d1547b134b # v3.21
        with:
          summaryQuantile: 0.9
          sortCriteria: avg,max
          sortOrders: desc,asc
        id: gas_diff

      - name: Post gas diff comment
        if: steps.gas_diff.outputs.markdown
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3.0.3
        with:
          header: gas-diff
          delete: ${{ !steps.gas_diff.outputs.markdown }}
          message: ${{ steps.gas_diff.outputs.markdown }}

  # ─── Job 7: Thorough Property Tests (main only) ────────────────────
  thorough:
    name: Thorough Property Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      FOUNDRY_PROFILE: ci_thorough
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.5.1

      - name: Restore build cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            out/
            cache/
          key: build-${{ github.sha }}

      - name: Run all tests (fuzz + invariant + stress + performance)
        run: forge test -vv
