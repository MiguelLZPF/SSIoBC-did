#* See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
## Sets the concrete solc version to use, this overrides the `auto_detect_solc` value
solc = '0.8.33'
evm_version = 'osaka'
# auto_detect_solc = true
optimizer = true
optimizer_runs = 200
# These are the default callers, generated using `address(uint160(uint256(keccak256("foundry default caller"))))`
# Changed to the default address of the mnemonic "test test test test test test test test test test test junk"
sender = '0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266'
tx_origin = '0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266'
initial_balance = '0xffffffffffffffffffffffff'

build_info = true
extra_output = ["storageLayout"]

remappings = [
  # Foundry remappings
  "@src/=src/",
  "@interfaces/=src/interfaces/",
  "@script/=script/",
  "@lib/=lib/",
  "@test/=test/",
  # OpenZeppelin remappings
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Configures permissions for cheatcodes that touch the filesystem like `vm.writeFile`
# `access` restricts how the `path` can be accessed via cheatcodes
#    `read-write` | `true`   => `read` + `write` access allowed (`vm.readFile` + `vm.writeFile`)
#    `none`| `false` => no access
#    `read` => only read access (`vm.readFile`)
#    `write` => only write access (`vm.writeFile`)
# The `allowed_paths` further lists the paths that are considered, e.g. `./` represents the project root directory
# By default _no_ fs access permission is granted, and _no_ paths are allowed
# following example enables read access for the project dir _only_:
#       `fs_permissions = [{ access = "read", path = "./"}]`
fs_permissions = [
  { access = "read-write", path = "./" },
] # default: all file cheat codes are disabled

# Linter configuration
# - unsafe-typecast: String to bytes32 conversions in tests are safe and intentional
# - pascal-case-struct: W3C acronym naming (W3CDidDocument, etc.) is intentional per W3C spec
# - mixed-case-variable: UPPER_CASE for semantically-constant variables (DEFAULT_CONTEXT, script env vars)
[lint]
exclude_lints = ["unsafe-typecast", "pascal-case-struct", "mixed-case-variable"]

# Fast CI profile — PRs and coverage (keeps wall-clock under 5 min)
[profile.ci]
fuzz = { runs = 256 }
invariant = { runs = 64, depth = 32 }
verbosity = 2

# Thorough CI profile — merge to main only (full property testing)
[profile.ci_thorough]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }
verbosity = 2

# Formatter configuration
[fmt]
# Indentation: 2 spaces instead of default 4
tab_width = 2

# Quote style: enforce double quotes
quote_style = "double"

# Line length: maximum 120 characters
line_length = 120

# Import handling: preserve manual ordering (external → internal)
sort_imports = false

# Spacing: bracket_spacing enabled for imports and function calls
# Note: This may format array access as `array[ index]` (known cosmetic issue)
bracket_spacing = true

# Additional formatting settings
wrap_comments = true             # Wrap long comments at line_length
number_underscore = "preserve"   # Keep number literal underscores as written
int_types = "long"               # Use explicit uint256/int256

# Exclude library dependencies from formatting
ignore = [
  "lib/**/*.sol"
]
